{% extends 'admin/base.html' %}

{% block access_control %}
    {% if current_user.is_authenticated %}
        <ul class="navbar-nav ml-auto align-items-center">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="perfilDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                    <img src="https://ui-avatars.com/api/?name={{ current_user.username }}&background=0D8ABC&color=fff&rounded=true&size=32" alt="Avatar" class="mr-2 shadow-sm rounded-circle">
                    <strong>{{ current_user.username }}</strong>
                </a>
                <div class="dropdown-menu dropdown-menu-right shadow" aria-labelledby="perfilDropdown">
                    <a class="dropdown-item" href="#">⚙️ Cambiar Contraseña</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}" onclick="localStorage.removeItem('chat_history');">
                        <strong>❌ Cerrar Sesión</strong>
                    </a>
                </div>
            </li>
        </ul>
    {% endif %}
{% endblock %}

{% block tail %}

<!-- APORTE DE WALDO -->
    <style>
        /* El z-index más alto para que flote sobre el menú sandwich */
        #chatbot-wrapper { position: fixed !important; bottom: 30px !important; right: 30px !important; z-index: 999999 !important; display: flex !important; flex-direction: column; align-items: center; }
        #chatbot-btn { width: 80px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3)); }
        #chatbot-btn:hover { transform: scale(1.1); }
        
        .chat-tooltip { background: white; padding: 8px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px; opacity: 0; transform: translateY(10px); transition: 0.3s; pointer-events: none; position: relative; color: #333; border: 1px solid #ccc;}
        .chat-tooltip::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: white transparent transparent transparent; }
        #chatbot-wrapper:hover .chat-tooltip { opacity: 1; transform: translateY(0); }
        
        #chatbot-modal { position: fixed !important; bottom: 100px !important; right: 30px !important; width: 380px; max-width: 85vw; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 999999 !important; display: none; border: 1px solid #ddd; flex-direction: column; overflow: hidden; }
        .msg-bot { background: #f1f3f5; padding: 12px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; align-self: flex-start; color: #333; font-size: 14px; border: 1px solid #eee; }
        .msg-user { background: #007bff; color: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; max-width: 85%; align-self: flex-end; font-size: 14px; }
    </style>

    <div id="chatbot-wrapper">
        <div class="chat-tooltip">¿En qué te ayudo hoy?</div>
        <img src="{{ url_for('static', filename='img/robot.png') }}" id="chatbot-btn" alt="Bot">
    </div>

    <div id="chatbot-modal">
        <div style="background-color: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <strong style="margin: 0;"><i class="fa-solid fa-robot"></i> Soporte IT Especializado</strong>
            <div>
                <button id="btn-limpiar" class="btn btn-xs btn-outline-light">↺</button>
                <button id="btn-cerrar" class="btn btn-xs btn-danger">X</button>
            </div>
        </div>
        <div id="chat-body" style="padding: 20px; display: flex; flex-direction: column; height: 380px; overflow-y: auto; background: #fff;"></div>
        <div style="padding: 15px; background: #f8f9fa; border-top: 1px solid #eee; display: flex;">
            <input type="text" id="chat-input" class="form-control" placeholder="Escribe tu consulta..." autocomplete="off">
            <button id="btn-enviar" class="btn btn-primary" style="margin-left: 10px;"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const wrapper = document.getElementById('chatbot-wrapper');
        const modal = document.getElementById('chatbot-modal');
        const btnCerrar = document.getElementById('btn-cerrar');
        const btnLimpiar = document.getElementById('btn-limpiar');
        const btnEnviar = document.getElementById('btn-enviar');
        const input = document.getElementById('chat-input');
        const body = document.getElementById('chat-body');

        function formatearTexto(texto) {
            let formateado = texto.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            return formateado.replace(/\n/g, '<br>');
        }

        let historial = JSON.parse(localStorage.getItem('chat_history')) || [];
        
        function renderizarHistorial() {
            if (!body) return;
            body.innerHTML = '';
            if(historial.length === 0) {
                body.innerHTML = '<div class="text-center text-muted small mt-2">Hola, soy tu consultor IT. ¿En qué puedo ayudarte?</div>';
            } else {
                historial.forEach(msg => {
                    body.innerHTML += `<div class="${msg.role === 'user' ? 'msg-user' : 'msg-bot'}">${formatearTexto(msg.text)}</div>`;
                });
            }
            body.scrollTop = body.scrollHeight;
        }
        renderizarHistorial();

        // Usamos onclick directo para asegurar ejecución
        wrapper.onclick = () => { 
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex'; 
            renderizarHistorial();
        };

        btnCerrar.onclick = (e) => { 
            e.stopPropagation(); 
            modal.style.display = 'none'; 
        };

        btnLimpiar.onclick = () => { 
            localStorage.removeItem('chat_history'); 
            historial = []; 
            renderizarHistorial(); 
        };

        async function mandarMensaje() {
            const texto = input.value.trim();
            if(!texto) return;
            
            historial.push({role: 'user', text: texto});
            localStorage.setItem('chat_history', JSON.stringify(historial));
            renderizarHistorial();
            input.value = '';

            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'msg-bot text-muted';
            thinkingDiv.innerHTML = '<i>Procesando...</i>';
            body.appendChild(thinkingDiv);
            body.scrollTop = body.scrollHeight;

            try {
                const req = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mensaje: texto})
                });
                const res = await req.json();
                body.removeChild(thinkingDiv);
                historial.push({role: 'bot', text: res.respuesta});
                localStorage.setItem('chat_history', JSON.stringify(historial));
                renderizarHistorial();
            } catch (e) {
                if (thinkingDiv.parentNode) body.removeChild(thinkingDiv);
                body.innerHTML += '<div class="msg-bot text-danger">Error de comunicación.</div>';
            }
        }

        btnEnviar.onclick = mandarMensaje;
        input.onkeypress = (e) => { if(e.key === 'Enter') mandarMensaje(); };
    });
    </script>
{% endblock %}
