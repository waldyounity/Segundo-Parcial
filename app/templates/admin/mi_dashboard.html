{% extends 'admin/master.html' %}

{% block body %}

<!-- APORTE DE BRAYAN -->

<style>
/* Estilos Generales */
.dashboard-container { background: #f4f6f9; padding: 25px; border-radius: 15px; }
.card-custom { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
background: white; margin-bottom: 25px; transition: 0.3s; }
.card-custom:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.ia-report-box {
background: #1e1e2f;
color: #ffffff;
border-radius: 15px;
font-family: 'Segoe UI', sans-serif;
min-height: 500px;
border-top: 5px solid #ffc107;
padding: 25px;
line-height: 1.7;
}
.btn-analizar { border-radius: 50px; font-weight: bold; padding: 12px 30px; border: none;
transition: 0.3s; }
.btn-analizar:hover { transform: scale(1.05); }
</style>
<div class="container-fluid dashboard-container">
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:
30px;">
<h2 style="font-weight: 800; color: #2c3e50;"><i class="fa-solid fa-gauge-high textprimary"></i> Estación de Comando <span class="text-primary">IT</span></h2>
<button id="btn-analizar-ia" class="btn btn-warning btn-analizar shadow">
<i class="fa-solid fa-robot"></i> Generar Auditoría Profunda
</button>
</div>
<div class="row">
<div class="col-md-5">
<div class="card card-custom p-3">
<h6 class="text-uppercase text-muted font-weight-bold mb-3"><i class="fa-solid fa-circlenotch"></i> Distribución de Carga</h6>
<canvas id="graficoTickets" height="180"></canvas>
</div>
<div class="card card-custom p-3">
<h6 class="text-uppercase text-muted font-weight-bold mb-3"><i class="fa-solid fa-layergroup"></i> Incidencias por Categoría</h6>
<canvas id="graficoCategorias" height="180"></canvas>
</div>
<div class="card card-custom p-3">
<h6 class="text-uppercase text-muted font-weight-bold mb-3"><i class="fa-solid famicrochip"></i> Estado del Inventario</h6>
<canvas id="graficoEquipos" height="180"></canvas>
</div>
</div>
<div class="col-md-7">
<div class="card card-custom p-0 overflow-hidden" style="height: 96%;">
<div class="card-header bg-dark text-white font-weight-bold py-3">
<i class="fa-solid fa-terminal text-warning"></i> INFORME TÉCNICO DE AUDITORÍA
</div>
<div class="card-body ia-report-box" id="resultado-analisis">
<div class="text-center" style="margin-top: 150px; color: #888;">
<i class="fa-solid fa-wave-square fa-3x mb-3"></i>
<p>> Esperando escaneo de base de datos...</p>
</div>
</div>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- APORTE DE SAMUEL -->

<script> 
document.addEventListener('DOMContentLoaded', () => { 
     
    // --- PARA EL FORMATEO DE LA IA --- 
    function formatearTexto(texto) { 
        let formateado = texto.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
        return formateado.replace(/\n/g, '<br>'); 
    } 
 
    // --- 1. LÓGICA DEL DASHBOARD  --- 
    fetch('/api/estadisticas') 
        .then(res => res.json()) 
        .then(data => { 
            // Gráfico 1: Estados  
            new Chart(document.getElementById('graficoTickets'), { 
                type: 'doughnut', 
                data: { 
                    labels: ['Pendientes', 'Cerrados'], 
                    datasets: [{ 
                        data: [data.abiertos, data.cerrados], 
                        backgroundColor: ['#ff6b6b', '#51cf66'], 
                        hoverOffset: 15, 
                        borderRadius: 10, 
                        borderWidth: 0 
                    }] 
                }, 
                options: { plugins: { legend: { position: 'bottom' } } } 
            }); 
 
            // Gráfico 2: Categorías 
            new Chart(document.getElementById('graficoCategorias'), { 
                type: 'bar', 
                data: { 
                    labels: data.cat_labels, 
                    datasets: [{ 
                        label: 'Tickets', 
                        data: data.cat_data, 
                        backgroundColor: '#339af0', 
                        borderRadius: 8 
                    }] 
                }, 
                options: {  
                    indexAxis: 'y', 
                    scales: { x: { grid: { display: false } }, y: { grid: { display: false } } } 
                } 
            }); 
 
            // Gráfico 3: Equipos 
            new Chart(document.getElementById('graficoEquipos'), { 
                type: 'pie', 
                data: { 
                    labels: ['Activos', 'En Reparación'], 
                    datasets: [{ 
                        data: data.equipos_stats, 
                        backgroundColor: ['#228be6', '#fab005'], 
                        borderWidth: 0 
                    }] 
                }, 
                options: { plugins: { legend: { position: 'bottom' } } } 
            }); 
        }); 
 
    document.getElementById('btn-analizar-ia').addEventListener('click', async () => { 
        const resultadoDiv = document.getElementById('resultado-analisis'); 
        resultadoDiv.innerHTML = '<div class="text-center" style="margin-top:150px;"><i class="fas fa
sync fa-spin fa-3x"></i><p class="mt-3">> ESCANEANDO FLUJO DE DATOS...</p></div>'; 
         
        try { 
            const req = await fetch('/api/analizar_dashboard'); 
            const res = await req.json(); 
            resultadoDiv.innerHTML = `<div style="text-align: left; animation: fadeIn 
0.5s;">${formatearTexto(res.analisis)}</div>`; 
        } catch (error) { 
            resultadoDiv.innerHTML = '<p class="text-danger">> ERROR CRÍTICO EN LA 
CONEXIÓN.</p>'; 
        } 
    }); 
}); 
</script>

{% endblock %}
